    .page1 { animation: pageTurn 3s ease-in-out infinite; transform-origin: left center; }
    .page2 { animation: pageTurn 3s ease-in-out infinite 0.2s; transform-origin: left center; }
    .page3 { animation: pageTurn 3s ease-in-out infinite 0.4s; transform-origin: left center; }
  </style>
